        <path d="M80 50 L140 50" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" />
        <path d="M80 100 L120 100 M110 50 L110 150" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" />
    </g>
    <text x="100" y="190" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="url(#grad)" text-anchor="middle" letter-spacing="2">ATENG</text>
</svg>
