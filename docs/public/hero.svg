<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
    <defs>
        <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#646cff;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#5af2ff;stop-opacity:0.3" />
        </linearGradient>
        <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#646cff;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
        </radialGradient>
    </defs>
    <circle cx="250" cy="250" r="200" fill="url(#ringGrad)" />
    <circle cx="250" cy="250" r="150" fill="none" stroke="#646cff" stroke-width="0.5" stroke-dasharray="10,5" opacity="0.5" />

    <g transform="translate(100, 100) scale(1.5)">
        <circle cx="100" cy="33.3" r="4" fill="#5af2ff" />
        <circle cx="33.3" cy="166.6" r="4" fill="#646cff" />
        <circle cx="166.6" cy="166.6" r="4" fill="#646cff" />

        <path d="M100 33.3 L33.3 166.6 M100 33.3 L166.6 166.6 M60 120 L140 120"
              fill="none" stroke="url(#heroGrad)" stroke-width="2" stroke-dasharray="200" stroke-dashoffset="0">
            <animate attributeName="stroke-dashoffset" from="400" to="0" dur="3s" repeatCount="1" />
        </path>

        <path d="M80 50 L160 50 M120 50 L120 180"
              fill="none" stroke="url(#heroGrad)" stroke-width="2" opacity="0.6">
            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite" />
        </path>

        <circle cx="120" cy="120" r="2" fill="#5af2ff">
            <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite" />
        </circle>
    </g>
</svg>
