<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="fav_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
        </linearGradient>
        <filter id="glow_icon" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <path d="M40 70 L60 30 L80 70" fill="none" stroke="url(#fav_grad)" stroke-width="10" stroke-linecap="round" filter="url(#glow_icon)" />
    <path d="M40 45 L80 45" fill="none" stroke="url(#fav_grad)" stroke-width="10" stroke-linecap="round" filter="url(#glow_icon)" />
</svg>
